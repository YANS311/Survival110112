{% extends 'game/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-danger pb-2">
    <h2 class="text-danger">🕵️‍♂️ 隐秘角落 (NPC 市场)</h2>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">逃回明面 (返回看板)</a>
</div>

<div class="alert alert-dark border-secondary text-muted mb-4" role="alert">
    在这座城市的折叠空间里，总有人能提供你急需的“捷径”。<br>
    <span class="text-danger">警告：所有的命运馈赠，都在暗中透支了你的 SAN 值或钱包。</span>
</div>

<div class="row g-4">
    {% for npc in npcs %}
    <div class="col-md-6">
        <div class="card h-100 bg-dark border-secondary hover-shadow">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                <strong class="fs-4" style="color: #ff9900;">👤 {{ npc.name }}</strong>
                <span class="badge bg-secondary">黑市商人</span>
            </div>
            <div class="card-body d-flex flex-column">
                <blockquote class="blockquote fs-6 text-light mb-4 flex-grow-1" style="border-left: 4px solid #ff4d4d; padding-left: 15px; background: rgba(255,0,0,0.05); padding-top: 10px; padding-bottom: 10px;">
                    {{ npc.msg }}
                </blockquote>
                
                <a href="{% url npc.action %}" class="btn btn-outline-danger w-100 fw-bold fs-5">
                    🤝 接受提议 (代价自负)
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center text-muted mt-5 p-5 border border-secondary rounded">
        <h4>风声太紧</h4>
        <p>今天没有 NPC 敢出来摆摊，回去写你的论文吧。</p>
    </div>
    {% endfor %}
</div>

<style>
    .hover-shadow:hover {
        box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        border-color: #ff4d4d !important;
        transition: all 0.3s ease;
    }
</style>
{% endblock %}
